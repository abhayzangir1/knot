# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
services:
  - type: web
    runtime: docker
    name: knot
    plan: starter
    healthCheckPath: /readyz
    maxShutdownDelaySeconds: 60
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: knot-db
          property: connectionString
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false

databases:
  - name: knot-db
    databaseName: knot
    user: knot
    postgresMajorVersion: "17"
    plan: basic-256mb
    ipAllowList: []
