services:
  db:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: knot
      POSTGRES_USER: knot
      POSTGRES_PASSWORD: knot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knot -d knot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - knot-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"

  knot:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://knot:knot@db:5432/knot
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/readyz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  knot-postgres:
